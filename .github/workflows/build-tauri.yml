name: Build Tauri App

on:
  push:
    branches: [main, master]
    paths:
      - 'rdp-multi-session-ui/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'rdp-multi-session-ui/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './rdp-multi-session-ui/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: ./rdp-multi-session-ui
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./rdp-multi-session-ui
          tagName: rdp-ui-v__VERSION__
          releaseName: 'RDP Multi-Session UI v__VERSION__'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: rdp-multi-session-ui-windows
          path: |
            rdp-multi-session-ui/src-tauri/target/release/bundle/msi/*.msi
            rdp-multi-session-ui/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7
